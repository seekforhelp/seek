<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background:url('https://i.pinimg.com/originals/ce/11/7c/ce117cc24180effeaaa12a0f23d946f8.gif') center center/cover no-repeat;
    position:relative;
}

body::before{
    content:"";
    position:absolute;
    inset:0;
    background:rgba(0,0,0,.35);
    backdrop-filter:blur(4px);
}

/* CLICK TO ENTER SCREEN */
#intro{
    position:fixed;
    inset:0;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:99999;
    cursor:pointer;
    transition:opacity .8s ease;
}

#intro.hidden{
    opacity:0;
    pointer-events:none;
}

.intro-content{
    text-align:center;
}

.intro-content h1{
    font-size:6rem;
    font-weight:700;
    color:white;
    letter-spacing:4px;
    text-shadow:0 0 20px rgba(255,255,255,.15);
}

.intro-content h1 span{
    color:#ff4438;
}

.intro-content p{
    margin-top:15px;
    color:#888;
    letter-spacing:8px;
    font-size:12px;
}

.profile{
    position:relative;
    z-index:2;
    text-align:center;
    color:white;
}

.avatar-wrapper{
    position:relative;
    width:110px;
    height:110px;
    margin:0 auto 15px;
}

.avatar{
    width:110px;
    height:110px;
    border-radius:50%;
    border:5px solid #111;
    object-fit:cover;
    box-shadow:0 0 25px rgba(0,0,0,.5);
}

.status-badge{
    position:absolute;
    bottom:5px;
    right:5px;
    width:24px;
    height:24px;
    border-radius:50%;
    border:4px solid #111;
    background:#80848e;
    transition:.3s;
}

.status-badge.online{ background:#23a55a; }
.status-badge.idle{ background:#f0b232; }
.status-badge.offline{ background:#80848e; }
.status-badge.dnd{ background:#f23f43; }
.status-badge.dnd::after{
    content:"";
    position:absolute;
    width:12px;
    height:4px;
    background:white;
    border-radius:4px;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
}

    ...

<body>

<!-- ENTER SCREEN -->
<div id="intro">
    <div class="intro-content">
        <h1></h1>
        <p>— CLICK HERE TO ENTER —</p>
    </div>
</div>

<!-- MUSIC -->
<audio id="bgMusic" loop preload="auto">
    <source src="music.mp3" type="audio/mpeg">
</audio>

<div class="card">

    <div class="avatar-wrapper">
        <img class="avatar"
        src="https://images-ext-1.discordapp.net/external/-Ohv5MfVtsEyAmQ_cSLoeRwWevxio60UzEObvWsXKO8/%3Fsize%3D4096%26ignore%3Dtrue%29./https/cdn.discordapp.com/avatars/1315665979673677855/89f3288a8266b5199ba2f082dafd9eba.png?format=webp&quality=lossless">

        <div id="discord-badge" class="status-badge online"></div>
    </div>

    <h1 class="display-name">m</h1>
    <p class="handle">@6taq</p>

    <p class="bio">
        hometown stackz
    </p>

    <div id="local-time" class="time-pill">
        Local Time
    </div>

    <div id="discord-presence" class="activity">
        no activity
    </div>

    <div class="social-container">

        <a href="https://discord.gg/BJyGPx4Q" target="_blank">
            <i class="fab fa-discord"></i>
        </a>


    </div>

    <div class="footer-pill">
        168
    </div>

</div>

<script>
/* CLICK TO ENTER FIXED */
const intro = document.getElementById("intro");
const music = document.getElementById("bgMusic");

// Use simple inline style removal to guarantee it works
intro.onclick = () => {
    music.play().catch(()=>{});
    intro.style.opacity = "0";
    setTimeout(()=>{ intro.style.display = "none"; }, 800);
};

/* DISCORD PRESENCE SCRIPT */
const userId = "1315665979673677855";

async function updateDiscordPresence() {
    try {
        const response = await fetch(`https://api.lanyard.rest/v1/users/${1315665979673677855}`);
        const json = await response.json();
        const data = json.data;

        const badge = document.getElementById("discord-badge");
        badge.className = "status-badge";

        switch (data.discord_status) {
            case "online": badge.classList.add("online"); break;
            case "idle": badge.classList.add("idle"); break;
            case "dnd": badge.classList.add("dnd"); break;
            default: badge.classList.add("offline");
        }

        let text = "";
        if (data.listening_to_spotify && data.spotify) {
            text = `🎵 Listening to ${data.spotify.song} - ${data.spotify.artist}`;
        }

        document.getElementById("discord-presence").innerHTML = text;

    } catch {
        document.getElementById("discord-presence").textContent = "";
    }
}

updateDiscordPresence();
setInterval(updateDiscordPresence, 15000);
</script>
