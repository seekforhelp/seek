<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>@/</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background:url('https://i.pinimg.com/originals/ce/11/7c/ce117cc24180effeaaa12a0f23d946f8.gif') center center/cover no-repeat;
    position:relative;
}

body::before{
    content:"";
    position:absolute;
    inset:0;
    background:rgba(0,0,0,.35);
    backdrop-filter:blur(4px);
}

/* CLICK TO ENTER */
#intro{
    position:fixed;
    inset:0;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:99999;
    cursor:pointer;
    transition:opacity .8s ease;
}

#intro.hidden{
    opacity:0;
    pointer-events:none;
}

.intro-content{
    text-align:center;
}

.intro-content h1{
    font-size:6rem;
    font-weight:700;
    color:white;
    letter-spacing:4px;
}

/* AVATAR */
.avatar-wrapper{
    position:relative;
    width:110px;
    height:110px;
    margin:0 auto 15px;
}

.avatar{
    width:110px;
    height:110px;
    border-radius:50%;
    border:5px solid #111;
    object-fit:cover;
    box-shadow:0 0 25px rgba(0,0,0,.5);
}

.status-badge{
    position:absolute;
    bottom:5px;
    right:5px;
    width:24px;
    height:24px;
    border-radius:50%;
    border:4px solid #111;
    background:#80848e;
}

.status-badge.online{ background:#23a55a; }
.status-badge.idle{ background:#f0b232; }
.status-badge.offline{ background:#80848e; }
.status-badge.dnd{ background:#f23f43; }

.status-badge.dnd::after{
    content:"";
    position:absolute;
    width:12px;
    height:4px;
    background:white;
    border-radius:4px;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
}

/* CARD */
.card{
    width:420px;
    max-width:90vw;
    padding:35px;
    text-align:center;
    background:rgba(0,0,0,.55);
    backdrop-filter:blur(25px);
    border:1px solid rgba(255,255,255,.08);
    border-radius:35px;
    box-shadow:0 20px 50px rgba(0,0,0,.5);
    color:white;
}

/* TEXT */
.display-name{
    font-size:3rem;
    font-weight:700;
    margin-top:15px;
}

.handle{
    opacity:.7;
    margin-top:5px;
}

.bio{
    margin-top:15px;
}

/* TIME */
.time-pill{
    display:inline-block;
    margin-top:15px;
    padding:8px 18px;
    background:rgba(255,255,255,.08);
    border-radius:999px;
}

/* ACTIVITY */
.activity{
    margin-top:15px;
    opacity:.9;
}

/* SOCIALS */
.social-container{
    margin-top:20px;
    display:flex;
    justify-content:center;
    gap:15px;
    padding:12px 18px;
    background:white;
    border-radius:999px;
}

.social-container a{
    color:black;
    font-size:26px;
}

/* FOOTER */
.footer-pill{
    margin-top:20px;
    display:inline-block;
    padding:10px 18px;
    border-radius:999px;
    background:rgba(255,255,255,.08);
    color:#aaa;
}

</style>
</head>

<body>
<!-- ENTER SCREEN -->
<div id="intro">
    <div class="intro-content">
        <h1></h1>
        <p>— CLICK HERE TO ENTER —</p>
    </div>
</div>

<audio id="bgMusic" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<div class="card">

    <div class="avatar-wrapper">
        <img class="avatar"
        src="https://cdn.discordapp.com/avatars/1315665979673677855/89f3288a8266b5199ba2f082dafd9eba.png">

        <div id="discord-badge" class="status-badge online"></div>
    </div>

    <h1 class="display-name">m</h1>
    <p class="handle">@6taq</p>

    <p class="bio">hometown stackz</p>

    <div id="local-time" class="time-pill">Local Time</div>

    <div id="discord-presence" class="activity">no activity</div>

    <div class="social-container">
        <a href="https://discord.gg/BJyGPx4Q"><i class="fab fa-discord"></i></a>
    </div>

    <div class="footer-pill">168</div>

</div>

<script>
const intro = document.getElementById("intro");
const music = document.getElementById("bgMusic");

intro.onclick = () => {
    music.play().catch(()=>{});
    intro.style.display = "none";
};

function updateTime(){
    const now = new Date();
    document.getElementById("local-time").innerText =
        "Local Time: " + now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
}
setInterval(updateTime, 1000);
updateTime();

const userId = "1315665979673677855";

async function updateDiscordPresence(){
    try{
        const res = await fetch(`https://api.lanyard.rest/v1/users/${userId}`);
        const json = await res.json();
        const data = json.data;

        const badge = document.getElementById("discord-badge");
        badge.className = "status-badge";

        if(data.discord_status === "online") badge.classList.add("online");
        else if(data.discord_status === "idle") badge.classList.add("idle");
        else if(data.discord_status === "dnd") badge.classList.add("dnd");
        else badge.classList.add("offline");

        document.getElementById("discord-presence").innerText =
            data.spotify ? `🎵 ${data.spotify.song}` : "no activity";

    }catch{}
}

updateDiscordPresence();
setInterval(updateDiscordPresence, 15000);
</script>

</body>
</html>
